       <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=Array.prototype.findIndex,Array.prototype.includes,Array.prototype.forEach,CustomEvent"></script>
       <script src="./script/one-page-scroll.min.js"></script>
       <script>
        window.addEventListener('load', function() {
           var el = document.querySelectorAll('section');
           var app = new onePageScroll({
             el: el
           });
           Array.prototype.slice.call(el).forEach(function(el) {
             ['inview','outview'].forEach(function(key) {
               el.addEventListener(key, function() {
                 console.log((el.getAttribute('name') || 'null') + ' is ' + key);
               });
             });
           });

           window.app = app;

           document.addEventListener('submit', function(e) {
             form = e.target;
             app.time = form.time.value;
             app.easing = form.easing.value;
             app.loop = form.loop.value === 'true';
             e.preventDefault();
           })
         });

       </script>

       <script>
       window.onbeforeunload = function () {
  window.scrollTo(0, 0);
}
